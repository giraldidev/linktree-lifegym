<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGym | Links Oficiais</title>
    <!-- SEO -->
    <meta name="description"
        content="Acesse todos os links oficiais da Academia LifeGym. Matrículas, modalidades, localização e contato direto.">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <!-- Logo and Header -->
        <header class="header">
            <img src="img/lifegymlogo.jpeg" alt="LifeGym Logo" class="logo" id="main-logo">
            <h1 class="profile-name">LifeGym</h1>
        </header>

        <!-- Main Links (Altere os links nos campos 'href') -->
        <main class="links-container">

            <!-- 1. MATRICULE-SE JÁ -->
            <a href="https://wa.me/5514998571716?text=Quero%20me%20matricular" class="link-button highlight"
                id="btn-matricula">
                <i class="fa-solid fa-dumbbell"></i>
                Matricule-se Já
            </a>

            <!-- 2. WELLHUB -->
            <a href="https://wellhub.com/pt-br/search/partners/life-gym-mineiros-do-tiete/" class="link-button" id="btn-wellhub">
                <i class="fa-solid fa-star-of-life"></i>
                Wellhub
            </a>

            <!-- 3. FACEBOOK -->
            <a href="https://www.facebook.com/LIFEGYMDAY/" class="link-button" id="btn-facebook">
                <i class="fa-brands fa-facebook-f"></i>
                Facebook
            </a>

            <!-- 4. INSTAGRAM -->
            <a href="https://www.instagram.com/academia.lifegym/" class="link-button" id="btn-instagram">
                <i class="fa-brands fa-instagram"></i>
                Instagram
            </a>

            <!-- 5. LOCALIZAÇÃO -->
            <a href="https://maps.app.goo.gl/5FwGUfhSn9RHYJ7KA" class="link-button" id="btn-localizacao">
                <i class="fa-solid fa-location-dot"></i>
                Localização
            </a>

        </main>
        <!-- Opening Hours -->
        <section class="opening-hours" id="horarios">
            <h2 class="section-title"><i class="fa-regular fa-clock"></i> Horário de Funcionamento</h2>
            <div class="hours-card">
                <div class="hours-row">
                    <span class="day">Segunda a Sexta</span>
                    <div class="time-slots">
                        <span class="time">05:30h às 12:30h</span>
                        <span class="time">15:00h às 21:00h</span>
                    </div>
                </div>
                <div class="hours-row">
                    <span class="day">Sábados</span>
                    <div class="time-slots">
                        <span class="time">09:00h às 13:00h</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer>
            <p>Feito por Vinicius Giraldi</p>
        </footer>
    </div>

</body>

</html>
